<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binance Trading Psychology Coach - AI 交易心理教练</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0B0E11;
      color: #EAECEF;
      line-height: 1.6;
    }
    
    .hero {
      background: linear-gradient(135deg, #F0B90B 0%, #F8D12F 100%);
      padding: 80px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="none"/><path d="M50 0 L100 50 L50 100 L0 50 Z" fill="rgba(0,0,0,0.05)"/></svg>') repeat;
      opacity: 0.3;
    }
    
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 56px;
      font-weight: 800;
      color: #0B0E11;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }
    
    .subtitle {
      font-size: 24px;
      color: #1E2329;
      margin-bottom: 40px;
      font-weight: 500;
    }
    
    .cta-button {
      display: inline-block;
      padding: 18px 48px;
      background: #0B0E11;
      color: #F0B90B;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 185, 11, 0.3);
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .demo-section {
      background: #1E2329;
      border-radius: 24px;
      padding: 60px;
      margin-bottom: 80px;
      border: 1px solid #2B3139;
    }
    
    .input-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      color: #B7BDC6;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    input, select {
      width: 100%;
      padding: 16px;
      background: #0B0E11;
      border: 1px solid #2B3139;
      border-radius: 8px;
      color: #EAECEF;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #F0B90B;
      box-shadow: 0 0 0 3px rgba(240, 185, 11, 0.1);
    }
    
    .analyze-button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #F0B90B 0%, #F8D12F 100%);
      color: #0B0E11;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 24px;
    }
    
    .analyze-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 185, 11, 0.3);
    }
    
    .analyze-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .results {
      display: none;
      margin-top: 40px;
      padding: 40px;
      background: #0B0E11;
      border-radius: 16px;
      border: 1px solid #2B3139;
    }
    
    .results.show {
      display: block;
    }
    
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: #1E2329;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #2B3139;
    }
    
    .stat-label {
      color: #B7BDC6;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #F0B90B;
    }
    
    .stat-value.negative {
      color: #F6465D;
    }
    
    .stat-value.positive {
      color: #0ECB81;
    }
    
    .problem-section {
      margin-top: 40px;
    }
    
    .problem-card {
      background: rgba(246, 70, 93, 0.1);
      border-left: 4px solid #F6465D;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .problem-title {
      color: #F6465D;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .problem-desc {
      color: #B7BDC6;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .suggestions {
      background: rgba(14, 203, 129, 0.1);
      border-left: 4px solid #0ECB81;
      padding: 24px;
      border-radius: 8px;
      margin-top: 24px;
    }
    
    .suggestions h3 {
      color: #0ECB81;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    
    .suggestion-item {
      color: #B7BDC6;
      font-size: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    
    .suggestion-item::before {
      content: '✓';
      color: #0ECB81;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    
    .suggestion-item:last-child {
      border-bottom: none;
    }
    
    .loading {
      text-align: center;
      color: #F0B90B;
      margin-top: 20px;
      font-size: 14px;
      display: none;
    }
    
    .loading.show {
      display: block;
    }
    
    .footer {
      background: #1E2329;
      padding: 40px 20px;
      text-align: center;
      color: #B7BDC6;
      border-top: 1px solid #2B3139;
    }
    
    .footer a {
      color: #F0B90B;
      text-decoration: none;
      font-weight: 600;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    .binance-badge {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(240, 185, 11, 0.1);
      border: 1px solid #F0B90B;
      border-radius: 20px;
      color: #F0B90B;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <div class="binance-badge">🏆 Build with Binance 2025</div>
      <h1>AI 交易心理教练</h1>
      <p class="subtitle">用 AI 分析你的交易心理，成为更理性的交易员</p>
      <a href="#demo" class="cta-button">立即体验</a>
    </div>
  </div>

  <div class="container">
    <div class="demo-section" id="demo">
      <h2 class="section-title">开始分析</h2>
      
      <div class="input-group">
        <label>Binance API Key</label>
        <input type="text" id="apiKey" placeholder="输入你的 API Key（只需只读权限）">
      </div>
      
      <div class="input-group">
        <label>Binance API Secret</label>
        <input type="password" id="apiSecret" placeholder="输入你的 API Secret">
      </div>
      
      <div class="input-group">
        <label>交易对</label>
        <select id="symbol">
          <option value="BTCUSDT">BTC/USDT</option>
          <option value="ETHUSDT">ETH/USDT</option>
          <option value="BNBUSDT">BNB/USDT</option>
          <option value="SOLUSDT">SOL/USDT</option>
        </select>
      </div>
      
      <div class="input-group">
        <label>分析时间范围</label>
        <select id="days">
          <option value="7">最近 7 天</option>
          <option value="30">最近 30 天</option>
          <option value="90">最近 90 天</option>
          <option value="365">最近 365 天</option>
        </select>
      </div>
      
      <button class="analyze-button" onclick="analyze()">开始分析</button>
      
      <div class="loading" id="loading">
        正在分析你的交易数据，请稍候...
      </div>
      
      <div class="results" id="results">
        <h3 style="color: #F0B90B; font-size: 24px; margin-bottom: 24px;">分析结果</h3>
        
        <div class="stat-grid" id="stats"></div>
        
        <!-- 风险评分 -->
        <div style="background: #1E2329; padding: 32px; border-radius: 16px; margin: 32px 0; border: 1px solid #2B3139;">
          <h3 style="color: #F0B90B; font-size: 20px; margin-bottom: 16px;">🎯 交易心理健康评分</h3>
          <div style="display: flex; align-items: center; gap: 24px;">
            <div style="flex: 1;">
              <div style="height: 24px; background: #0B0E11; border-radius: 12px; overflow: hidden;">
                <div id="riskBar" style="height: 100%; background: linear-gradient(90deg, #F6465D 0%, #F8D12F 50%, #0ECB81 100%); width: 0%; transition: width 1s;"></div>
              </div>
            </div>
            <div id="riskScore" style="font-size: 48px; font-weight: 700; color: #F0B90B; min-width: 100px; text-align: right;">0</div>
          </div>
          <p id="riskLevel" style="color: #B7BDC6; margin-top: 12px; font-size: 14px;"></p>
        </div>
        
        <!-- 对比分析 -->
        <div style="background: #1E2329; padding: 32px; border-radius: 16px; margin: 32px 0; border: 1px solid #2B3139;">
          <h3 style="color: #F0B90B; font-size: 20px; margin-bottom: 24px;">📊 你 vs 市场平均</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
            <div style="text-align: center;">
              <div style="color: #B7BDC6; font-size: 12px; margin-bottom: 8px;">胜率</div>
              <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div id="yourWinRate" style="font-size: 32px; font-weight: 700; color: #F0B90B;">0%</div>
                <div style="color: #707A8A;">vs</div>
                <div style="font-size: 24px; font-weight: 600; color: #B7BDC6;">45%</div>
              </div>
              <div id="winRateCompare" style="color: #B7BDC6; font-size: 12px; margin-top: 8px;"></div>
            </div>
            
            <div style="text-align: center;">
              <div style="color: #B7BDC6; font-size: 12px; margin-bottom: 8px;">盈亏比</div>
              <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div id="yourProfitFactor" style="font-size: 32px; font-weight: 700; color: #F0B90B;">0</div>
                <div style="color: #707A8A;">vs</div>
                <div style="font-size: 24px; font-weight: 600; color: #B7BDC6;">1.5</div>
              </div>
              <div id="profitFactorCompare" style="color: #B7BDC6; font-size: 12px; margin-top: 8px;"></div>
            </div>
            
            <div style="text-align: center;">
              <div style="color: #B7BDC6; font-size: 12px; margin-bottom: 8px;">FOMO 频率</div>
              <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div id="yourFomoRate" style="font-size: 32px; font-weight: 700; color: #F0B90B;">0%</div>
                <div style="color: #707A8A;">vs</div>
                <div style="font-size: 24px; font-weight: 600; color: #B7BDC6;">15%</div>
              </div>
              <div id="fomoRateCompare" style="color: #B7BDC6; font-size: 12px; margin-top: 8px;"></div>
            </div>
          </div>
        </div>
        
        <!-- 图表区域 -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 32px 0;">
          <div style="background: #1E2329; padding: 24px; border-radius: 16px; border: 1px solid #2B3139;">
            <h4 style="color: #F0B90B; font-size: 16px; margin-bottom: 16px;">时段胜率分析</h4>
            <canvas id="timeChart"></canvas>
          </div>
          <div style="background: #1E2329; padding: 24px; border-radius: 16px; border: 1px solid #2B3139;">
            <h4 style="color: #F0B90B; font-size: 16px; margin-bottom: 16px;">持仓时间分布</h4>
            <canvas id="holdTimeChart"></canvas>
          </div>
        </div>
        
        <div class="problem-section" id="problems"></div>
        
        <div class="suggestions" id="suggestions"></div>
        
        <!-- 导出按钮 -->
        <div style="margin-top: 32px; display: flex; gap: 16px; justify-content: center;">
          <button onclick="startMonitoring()" id="monitorBtn" style="padding: 14px 32px; background: linear-gradient(135deg, #F0B90B 0%, #F8D12F 100%); color: #0B0E11; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
            🚨 启动实时监控
          </button>
          <button onclick="exportPDF()" style="padding: 14px 32px; background: #1E2329; color: #F0B90B; border: 1px solid #F0B90B; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
            📄 导出 PDF 报告
          </button>
        </div>
        
        <!-- 实时监控面板 -->
        <div id="monitorPanel" style="display: none; margin-top: 32px; background: #1E2329; padding: 32px; border-radius: 16px; border: 1px solid #2B3139;">
          <h3 style="color: #F0B90B; font-size: 20px; margin-bottom: 16px;">🚨 实时监控中...</h3>
          <div style="color: #B7BDC6; margin-bottom: 16px;">
            正在监控 <span id="monitorSymbol" style="color: #F0B90B; font-weight: 600;"></span> 的价格变化和交易行为
          </div>
          <div id="alertsList" style="max-height: 400px; overflow-y: auto;"></div>
          <button onclick="stopMonitoring()" style="margin-top: 16px; padding: 12px 24px; background: #F6465D; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">
            停止监控
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>Built with ❤️ for <a href="https://www.binance.com" target="_blank">Binance</a></p>
    <p style="margin-top: 12px;">
      <a href="https://github.com/xj0102/binance-psychology" target="_blank">GitHub</a> · 
      <a href="#" target="_blank">Demo Video</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    async function analyze() {
      const apiKey = document.getElementById('apiKey').value;
      const apiSecret = document.getElementById('apiSecret').value;
      const symbol = document.getElementById('symbol').value;
      const days = document.getElementById('days').value;
      
      if (!apiKey || !apiSecret) {
        alert('请输入 API Key 和 Secret');
        return;
      }
      
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const button = document.querySelector('.analyze-button');
      
      button.disabled = true;
      loading.classList.add('show');
      results.classList.remove('show');
      
      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey, apiSecret, symbol, days })
        });
        
        if (!response.ok) {
          throw new Error('分析失败');
        }
        
        const data = await response.json();
        displayResults(data);
        
      } catch (e) {
        alert('分析失败: ' + e.message);
      } finally {
        button.disabled = false;
        loading.classList.remove('show');
      }
    }
    
    function displayResults(data) {
      // 显示统计数据
      const stats = document.getElementById('stats');
      stats.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">总交易次数</div>
          <div class="stat-value">${data.totalTrades}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">胜率</div>
          <div class="stat-value ${data.winRate >= 50 ? 'positive' : 'negative'}">${data.winRate}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">总盈亏</div>
          <div class="stat-value ${parseFloat(data.totalPnl) >= 0 ? 'positive' : 'negative'}">$${data.totalPnl}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">盈亏比</div>
          <div class="stat-value">${data.profitFactor}</div>
        </div>
      `;
      
      // 计算风险评分 (0-100)
      let score = 100;
      score -= data.fomoCount * 5; // FOMO 每次扣 5 分
      score -= data.revengeCount * 5; // 报复性交易每次扣 5 分
      score -= Math.max(0, (parseFloat(data.avgStopLoss) - 3) * 2); // 止损超过 3% 扣分
      score -= Math.max(0, (50 - parseFloat(data.winRate)) * 0.5); // 胜率低于 50% 扣分
      score = Math.max(0, Math.min(100, score));
      
      const riskBar = document.getElementById('riskBar');
      const riskScore = document.getElementById('riskScore');
      const riskLevel = document.getElementById('riskLevel');
      
      setTimeout(() => {
        riskBar.style.width = score + '%';
        riskScore.textContent = Math.round(score);
        
        if (score >= 80) {
          riskLevel.textContent = '✅ 优秀 - 你的交易心理非常健康';
          riskScore.style.color = '#0ECB81';
        } else if (score >= 60) {
          riskLevel.textContent = '⚠️ 良好 - 还有一些改进空间';
          riskScore.style.color = '#F8D12F';
        } else {
          riskLevel.textContent = '🔴 需要改进 - 建议重点关注心理问题';
          riskScore.style.color = '#F6465D';
        }
      }, 100);
      
      // 对比分析
      const yourWinRate = parseFloat(data.winRate);
      const marketAvgWinRate = 45;
      document.getElementById('yourWinRate').textContent = yourWinRate.toFixed(1) + '%';
      document.getElementById('yourWinRate').style.color = yourWinRate >= marketAvgWinRate ? '#0ECB81' : '#F6465D';
      
      const winRateDiff = yourWinRate - marketAvgWinRate;
      document.getElementById('winRateCompare').textContent = 
        winRateDiff >= 0 
          ? `高于平均 ${winRateDiff.toFixed(1)}%` 
          : `低于平均 ${Math.abs(winRateDiff).toFixed(1)}%`;
      document.getElementById('winRateCompare').style.color = winRateDiff >= 0 ? '#0ECB81' : '#F6465D';
      
      const yourProfitFactor = parseFloat(data.profitFactor);
      const marketAvgProfitFactor = 1.5;
      document.getElementById('yourProfitFactor').textContent = yourProfitFactor.toFixed(2);
      document.getElementById('yourProfitFactor').style.color = yourProfitFactor >= marketAvgProfitFactor ? '#0ECB81' : '#F6465D';
      
      const profitFactorDiff = yourProfitFactor - marketAvgProfitFactor;
      document.getElementById('profitFactorCompare').textContent = 
        profitFactorDiff >= 0 
          ? `高于平均 ${profitFactorDiff.toFixed(2)}` 
          : `低于平均 ${Math.abs(profitFactorDiff).toFixed(2)}`;
      document.getElementById('profitFactorCompare').style.color = profitFactorDiff >= 0 ? '#0ECB81' : '#F6465D';
      
      const yourFomoRate = data.totalTrades > 0 ? (data.fomoCount / data.totalTrades * 100) : 0;
      const marketAvgFomoRate = 15;
      document.getElementById('yourFomoRate').textContent = yourFomoRate.toFixed(1) + '%';
      document.getElementById('yourFomoRate').style.color = yourFomoRate <= marketAvgFomoRate ? '#0ECB81' : '#F6465D';
      
      const fomoRateDiff = yourFomoRate - marketAvgFomoRate;
      document.getElementById('fomoRateCompare').textContent = 
        fomoRateDiff <= 0 
          ? `低于平均 ${Math.abs(fomoRateDiff).toFixed(1)}%` 
          : `高于平均 ${fomoRateDiff.toFixed(1)}%`;
      document.getElementById('fomoRateCompare').style.color = fomoRateDiff <= 0 ? '#0ECB81' : '#F6465D';
      
      // 绘制时段图表
      if (data.timePattern) {
        const timeCtx = document.getElementById('timeChart').getContext('2d');
        new Chart(timeCtx, {
          type: 'bar',
          data: {
            labels: data.timePattern.map(t => t.hour + ':00'),
            datasets: [{
              label: '胜率 (%)',
              data: data.timePattern.map(t => t.winRate),
              backgroundColor: data.timePattern.map(t => 
                parseFloat(t.winRate) >= 50 ? 'rgba(14, 203, 129, 0.8)' : 'rgba(246, 70, 93, 0.8)'
              ),
              borderColor: data.timePattern.map(t => 
                parseFloat(t.winRate) >= 50 ? '#0ECB81' : '#F6465D'
              ),
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: {
                beginAtZero: true,
                max: 100,
                ticks: { color: '#B7BDC6' },
                grid: { color: 'rgba(255, 255, 255, 0.05)' }
              },
              x: {
                ticks: { color: '#B7BDC6' },
                grid: { color: 'rgba(255, 255, 255, 0.05)' }
              }
            }
          }
        });
      }
      
      // 绘制持仓时间图表
      const holdTimeCtx = document.getElementById('holdTimeChart').getContext('2d');
      new Chart(holdTimeCtx, {
        type: 'doughnut',
        data: {
          labels: ['短线 (<1h)', '中线 (1-24h)', '长线 (>24h)'],
          datasets: [{
            data: [
              data.shortTermCount || 0,
              data.mediumTermCount || 0,
              data.longTermCount || 0
            ],
            backgroundColor: [
              'rgba(246, 70, 93, 0.8)',
              'rgba(248, 209, 47, 0.8)',
              'rgba(14, 203, 129, 0.8)'
            ],
            borderColor: ['#F6465D', '#F8D12F', '#0ECB81'],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#B7BDC6', padding: 15 }
            }
          }
        }
      });
      
      // 显示问题
      const problems = document.getElementById('problems');
      let problemsHtml = '<h3 style="color: #F6465D; font-size: 20px; margin-bottom: 16px;">发现的问题</h3>';
      
      if (data.fomoCount > 0) {
        problemsHtml += `
          <div class="problem-card">
            <div class="problem-title">🔴 FOMO 追涨</div>
            <div class="problem-desc">
              检测到 ${data.fomoCount} 次在价格暴涨后追涨<br>
              胜率: ${data.fomoWinRate}%<br>
              总亏损: $${Math.abs(data.fomoLoss).toFixed(2)}
            </div>
          </div>
        `;
      }
      
      if (data.revengeCount > 0) {
        problemsHtml += `
          <div class="problem-card">
            <div class="problem-title">⚡ 报复性交易</div>
            <div class="problem-desc">
              检测到 ${data.revengeCount} 次在亏损后 30 分钟内交易<br>
              胜率: ${data.revengeWinRate}%
            </div>
          </div>
        `;
      }
      
      if (data.bigLossCount > 5) {
        problemsHtml += `
          <div class="problem-card">
            <div class="problem-title">🛑 止损纪律较差</div>
            <div class="problem-desc">
              ${data.bigLossCount} 次大额亏损 (>5%)<br>
              平均止损: ${data.avgStopLoss}%<br>
              建议: 3%
            </div>
          </div>
        `;
      }
      
      if (data.fomoCount === 0 && data.revengeCount === 0 && data.bigLossCount <= 5) {
        problemsHtml += '<div style="color: #0ECB81; padding: 20px; text-align: center;">✓ 未发现严重心理问题</div>';
      }
      
      problems.innerHTML = problemsHtml;
      
      // 显示建议
      const suggestions = document.getElementById('suggestions');
      let suggestionsHtml = '<h3>💡 改进建议</h3>';
      
      if (data.fomoCount > 0) {
        suggestionsHtml += '<div class="suggestion-item">避免在价格暴涨 5% 后买入 - 等待回调</div>';
      }
      
      if (data.revengeCount > 0) {
        suggestionsHtml += '<div class="suggestion-item">亏损后等待 1 小时再交易 - 冷静期</div>';
      }
      
      if (parseFloat(data.avgStopLoss) > 5) {
        suggestionsHtml += '<div class="suggestion-item">设置 -3% 自动止损 - 及早止损</div>';
      }
      
      if (parseFloat(data.winRate) < 50) {
        suggestionsHtml += '<div class="suggestion-item">专注提高胜率 - 减少交易频率，提高质量</div>';
      }
      
      if (data.fomoCount === 0 && data.revengeCount === 0 && parseFloat(data.avgStopLoss) <= 5) {
        suggestionsHtml += '<div class="suggestion-item">继续保持良好的交易纪律</div>';
      }
      
      suggestions.innerHTML = suggestionsHtml;
      
      // 显示结果
      document.getElementById('results').classList.add('show');
      
      // 保存到历史记录
      saveToHistory(data);
      
      // 保存数据用于导出
      window.currentAnalysis = data;
    }
    
    function saveToHistory(data) {
      const history = JSON.parse(localStorage.getItem('analysisHistory') || '[]');
      
      const record = {
        symbol: document.getElementById('symbol').value,
        days: document.getElementById('days').value,
        timestamp: Date.now(),
        data: {
          totalTrades: data.totalTrades,
          winRate: data.winRate,
          totalPnl: data.totalPnl,
          profitFactor: data.profitFactor,
          riskScore: Math.round(parseFloat(document.getElementById('riskScore').textContent))
        }
      };
      
      history.unshift(record);
      
      // 只保留最近 10 条
      if (history.length > 10) {
        history.length = 10;
      }
      
      localStorage.setItem('analysisHistory', JSON.stringify(history));
      updateHistoryDisplay();
    }
    
    function updateHistoryDisplay() {
      const history = JSON.parse(localStorage.getItem('analysisHistory') || '[]');
      
      if (history.length === 0) return;
      
      let historyHtml = '<div style="background: #1E2329; padding: 32px; border-radius: 16px; margin: 32px 0; border: 1px solid #2B3139;">';
      historyHtml += '<h3 style="color: #F0B90B; font-size: 20px; margin-bottom: 24px;">📜 历史记录</h3>';
      
      history.forEach((record, index) => {
        const date = new Date(record.timestamp).toLocaleString('zh-CN');
        historyHtml += `
          <div style="background: #0B0E11; padding: 20px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <div>
              <div style="color: #F0B90B; font-weight: 600; margin-bottom: 4px;">${record.symbol} · ${record.days} 天</div>
              <div style="color: #B7BDC6; font-size: 14px;">${date}</div>
            </div>
            <div style="text-align: right;">
              <div style="color: #EAECEF; font-size: 18px; font-weight: 600;">评分: ${record.data.riskScore}</div>
              <div style="color: #B7BDC6; font-size: 14px;">胜率: ${record.data.winRate}%</div>
            </div>
          </div>
        `;
      });
      
      historyHtml += '</div>';
      
      const results = document.getElementById('results');
      if (!document.getElementById('historySection')) {
        const historyDiv = document.createElement('div');
        historyDiv.id = 'historySection';
        historyDiv.innerHTML = historyHtml;
        results.appendChild(historyDiv);
      }
    }
    
    function exportPDF() {
      const data = window.currentAnalysis;
      if (!data) {
        alert('没有可导出的数据');
        return;
      }
      
      // 生成 PDF 内容（使用 window.print）
      const printWindow = window.open('', '_blank');
      const symbol = document.getElementById('symbol').value;
      const days = document.getElementById('days').value;
      
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>交易心理分析报告 - ${symbol}</title>
          <style>
            body { font-family: Arial, sans-serif; padding: 40px; }
            h1 { color: #F0B90B; }
            .stat { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 8px; }
            .stat-label { color: #666; font-size: 14px; }
            .stat-value { font-size: 24px; font-weight: bold; color: #333; }
            .problem { margin: 15px 0; padding: 15px; background: #fff5f5; border-left: 4px solid #F6465D; }
            .suggestion { margin: 15px 0; padding: 15px; background: #f0fdf4; border-left: 4px solid #0ECB81; }
          </style>
        </head>
        <body>
          <h1>🏆 Binance 交易心理分析报告</h1>
          <p><strong>交易对:</strong> ${symbol} | <strong>时间范围:</strong> ${days} 天</p>
          <p><strong>生成时间:</strong> ${new Date().toLocaleString('zh-CN')}</p>
          
          <h2>📊 核心数据</h2>
          <div class="stat">
            <div class="stat-label">总交易次数</div>
            <div class="stat-value">${data.totalTrades}</div>
          </div>
          <div class="stat">
            <div class="stat-label">胜率</div>
            <div class="stat-value">${data.winRate}%</div>
          </div>
          <div class="stat">
            <div class="stat-label">总盈亏</div>
            <div class="stat-value">$${data.totalPnl}</div>
          </div>
          <div class="stat">
            <div class="stat-label">盈亏比</div>
            <div class="stat-value">${data.profitFactor}</div>
          </div>
          
          <h2>🔴 发现的问题</h2>
          ${data.fomoCount > 0 ? `
            <div class="problem">
              <strong>FOMO 追涨</strong><br>
              检测到 ${data.fomoCount} 次在价格暴涨后追涨<br>
              胜率: ${data.fomoWinRate}%
            </div>
          ` : ''}
          ${data.revengeCount > 0 ? `
            <div class="problem">
              <strong>报复性交易</strong><br>
              检测到 ${data.revengeCount} 次在亏损后 30 分钟内交易<br>
              胜率: ${data.revengeWinRate}%
            </div>
          ` : ''}
          ${data.bigLossCount > 5 ? `
            <div class="problem">
              <strong>止损纪律较差</strong><br>
              ${data.bigLossCount} 次大额亏损 (>5%)<br>
              平均止损: ${data.avgStopLoss}%
            </div>
          ` : ''}
          
          <h2>💡 改进建议</h2>
          ${data.fomoCount > 0 ? '<div class="suggestion">避免在价格暴涨 5% 后买入 - 等待回调</div>' : ''}
          ${data.revengeCount > 0 ? '<div class="suggestion">亏损后等待 1 小时再交易 - 冷静期</div>' : ''}
          ${parseFloat(data.avgStopLoss) > 5 ? '<div class="suggestion">设置 -3% 自动止损 - 及早止损</div>' : ''}
          
          <hr style="margin: 40px 0;">
          <p style="text-align: center; color: #666;">
            Generated by Binance Trading Psychology Coach<br>
            <a href="https://github.com/xj0102/binance-psychology">github.com/xj0102/binance-psychology</a>

        </body>
        </html>
      `);
      
      printWindow.document.close();
      
      setTimeout(() => {
        printWindow.print();
      }, 500);
    }
    
    let monitoringWs = null;
    let priceHistory = [];
    
    function startMonitoring() {
      const symbol = document.getElementById('symbol').value;
      const monitorPanel = document.getElementById('monitorPanel');
      const monitorSymbol = document.getElementById('monitorSymbol');
      const monitorBtn = document.getElementById('monitorBtn');
      
      monitorPanel.style.display = 'block';
      monitorSymbol.textContent = symbol;
      monitorBtn.disabled = true;
      
      // 连接 WebSocket
      const wsUrl = `wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`;
      monitoringWs = new WebSocket(wsUrl);
      
      monitoringWs.onopen = () => {
        addAlert('success', '✅ 监控已启动', '正在实时监控价格变化...');
      };
      
      monitoringWs.onmessage = (event) => {
        const trade = JSON.parse(event.data);
        const price = parseFloat(trade.p);
        
        priceHistory.push({ price, time: Date.now() });
        
        // 只保留最近 1 小时
        const oneHourAgo = Date.now() - 3600000;
        priceHistory = priceHistory.filter(p => p.time > oneHourAgo);
        
        // 检查 FOMO
        if (priceHistory.length >= 2) {
          const oldPrice = priceHistory[0].price;
          const priceChange = ((price - oldPrice) / oldPrice) * 100;
          
          if (priceChange > 5) {
            const data = window.currentAnalysis;
            addAlert('warning', '🚨 FOMO 警告！', 
              `${symbol} 刚涨了 ${priceChange.toFixed(1)}%<br><br>` +
              `你历史上有 ${data.fomoCount} 次 FOMO，胜率 ${data.fomoWinRate}%<br><br>` +
              `建议：等待回调再买入`
            );
            
            // 清空历史，避免重复警告
            priceHistory = [];
          }
        }
      };
      
      monitoringWs.onerror = () => {
        addAlert('error', '❌ 连接失败', '无法连接到 Binance WebSocket');
      };
    }
    
    function stopMonitoring() {
      if (monitoringWs) {
        monitoringWs.close();
        monitoringWs = null;
      }
      
      document.getElementById('monitorPanel').style.display = 'none';
      document.getElementById('monitorBtn').disabled = false;
      priceHistory = [];
    }
    
    function addAlert(type, title, message) {
      const alertsList = document.getElementById('alertsList');
      const colors = {
        success: '#0ECB81',
        warning: '#F8D12F',
        error: '#F6465D'
      };
      
      const alert = document.createElement('div');
      alert.style.cssText = `
        background: rgba(${type === 'success' ? '14, 203, 129' : type === 'warning' ? '248, 209, 47' : '246, 70, 93'}, 0.1);
        border-left: 4px solid ${colors[type]};
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 12px;
      `;
      
      alert.innerHTML = `
        <div style="color: ${colors[type]}; font-weight: 700; margin-bottom: 4px;">${title}</div>
        <div style="color: #B7BDC6; font-size: 14px;">${message}</div>
        <div style="color: #707A8A; font-size: 12px; margin-top: 8px;">${new Date().toLocaleTimeString()}</div>
      `;
      
      alertsList.insertBefore(alert, alertsList.firstChild);
      
      // 只保留最近 10 条
      while (alertsList.children.length > 10) {
        alertsList.removeChild(alertsList.lastChild);
      }
    }
  </script>
